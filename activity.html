<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Historique d'activité - SwordManager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <div id="toast" class="toast-hidden" role="status" aria-live="polite"></div>

    <div id="vault-screen">
      <header class="vault-header">
        <div class="brand-mini">
          <span class="brand-mini-logo" aria-hidden="true">🗡️</span>
          <span>SwordManager</span>
        </div>
        <div class="header-actions">
          <a href="/" class="btn btn-ghost">
            <span aria-hidden="true">⬅️</span>
            <span>Retour au coffre</span>
          </a>
        </div>
      </header>

      <main class="vault-main">
        <div class="vault-title-row">
          <h2>Historique d'activité</h2>
          <p class="entries-count">
            Connexions, ajouts, modifications, suppressions et consultations
            de mots de passe sur votre compte.
          </p>
        </div>

        <div id="activity-filters" class="filter-chip-row">
          <!-- Rempli en JS -->
        </div>

        <div id="activity-page-list" style="margin-top: 20px">
          <!-- Rempli en JS -->
        </div>
      </main>
    </div>

    <script src="src/session-guard.js"></script>
    <script src="src/backend-status.js"></script>
    <script src="src/activity.js"></script>
  </body>
</html>
