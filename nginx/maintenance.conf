# Config alternative servie quand MAINTENANCE_MODE=true (voir Dockerfile) : toute
# requête reçoit la page de maintenance avec un statut 503, y compris les fichiers
# statiques (JS/CSS), pour éviter un état intermédiaire incohérent côté client.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location = /assets/favicon.svg {
        try_files $uri =404;
    }

    location = /src/style.css {
        try_files $uri =404;
    }

    location / {
        return 503;
    }

    error_page 503 /maintenance.html;
    location = /maintenance.html {
        internal;
    }
}
