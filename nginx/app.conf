server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # URLs propres : /activity sert activity.html sans exposer l'extension.
    # index.html reste servi normalement sur "/" via la directive `index` ci-dessus.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    error_page 500 502 503 504 /maintenance.html;
    location = /maintenance.html {
        internal;
    }
}
