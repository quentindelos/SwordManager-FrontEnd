<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Page introuvable - SwordManager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <div id="master-screen">
      <div class="auth-card">
        <div class="auth-brand">
          <div class="brand-logo">🗡️</div>
          <h1>SwordManager</h1>
          <p class="brand-tagline">
            Votre coffre-fort de mots de passe, chiffré de bout en bout.
          </p>
        </div>

        <div class="auth-form" style="text-align: center">
          <div style="font-size: 3rem; line-height: 1">🧭</div>
          <h2>Page introuvable</h2>
          <p class="hint">
            Cette page n'existe pas ou a été déplacée. Vérifiez l'adresse ou
            retournez à votre coffre.
          </p>

          <div class="auth-actions">
            <a href="/" class="btn btn-primary btn-block">
              Retour au coffre
            </a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
